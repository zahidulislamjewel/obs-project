<div class="form-page container">

  <!-- Header -->
  <div class="form-header">
    <a routerLink="/books" class="back-link">
      <i class="fas fa-arrow-left"></i> Back
    </a>
    <div>
      <h1 class="form-title">{{ isEditMode ? 'Edit Book' : 'Add New Book' }}</h1>
      <p class="form-subtitle">{{ isEditMode ? 'Update the details below' : 'Fill in the details to list a new book' }}</p>
    </div>
  </div>

  <div class="form-layout">
    <!-- Form -->
    <div class="form-card">
      <form (ngSubmit)="onSubmit()" #bookForm="ngForm">

        <div class="form-grid">
          <div class="form-group full-width">
            <label for="title">Title <span class="req">*</span></label>
            <input id="title" name="title" [(ngModel)]="formData.title" required
              placeholder="e.g. Clean Code" class="form-control">
          </div>

          <!-- Authors multi-select -->
          <div class="form-group">
            <label>Authors <span class="req">*</span></label>
            <div class="multi-select-list">
              <label *ngFor="let a of authors" class="checkbox-item">
                <input type="checkbox" [checked]="isAuthorSelected(a.id)" (change)="toggleAuthor(a.id)">
                {{ a.name }}
              </label>
              <p *ngIf="authors.length === 0" class="no-options">No authors yet.</p>
            </div>
            <p *ngIf="formData.authorIds.length === 0" class="field-hint req-hint">Select at least one author</p>
            <button type="button" class="btn btn-ghost btn-sm" style="margin-top:8px" (click)="toggleAuthorForm()">
              <i class="fas" [class.fa-plus]="!showAuthorForm" [class.fa-times]="showAuthorForm"></i>
              {{ showAuthorForm ? 'Cancel' : 'New Author' }}
            </button>

            <div *ngIf="showAuthorForm" class="inline-author-form">
              <div class="form-group">
                <label>Name <span class="req">*</span></label>
                <input name="newAuthorName" [(ngModel)]="newAuthorData.name" placeholder="Author name" class="form-control">
              </div>
              <div class="form-group">
                <label>Bio</label>
                <textarea name="newAuthorBio" [(ngModel)]="newAuthorData.bio" rows="2" placeholder="Short bio (optional)" class="form-control"></textarea>
              </div>
              <button type="button" class="btn btn-primary btn-sm" (click)="saveNewAuthor()">
                <i class="fas fa-check"></i> Save Author
              </button>
            </div>
          </div>

          <!-- Categories multi-select -->
          <div class="form-group">
            <label>Categories <span class="req">*</span></label>
            <div class="multi-select-list">
              <label *ngFor="let c of categories" class="checkbox-item">
                <input type="checkbox" [checked]="isCategorySelected(c.id)" (change)="toggleCategory(c.id)">
                {{ c.name }}
              </label>
              <p *ngIf="categories.length === 0" class="no-options">No categories yet.</p>
            </div>
            <p *ngIf="formData.categoryIds.length === 0" class="field-hint req-hint">Select at least one category</p>
            <button type="button" class="btn btn-ghost btn-sm" style="margin-top:8px" (click)="toggleCategoryForm()">
              <i class="fas" [class.fa-plus]="!showCategoryForm" [class.fa-times]="showCategoryForm"></i>
              {{ showCategoryForm ? 'Cancel' : 'New Category' }}
            </button>

            <div *ngIf="showCategoryForm" class="inline-author-form">
              <div class="form-group">
                <label>Name <span class="req">*</span></label>
                <input name="newCategoryName" [(ngModel)]="newCategoryData.name" placeholder="Category name" class="form-control">
              </div>
              <div class="form-group">
                <label>Description</label>
                <textarea name="newCategoryDesc" [(ngModel)]="newCategoryData.description" rows="2" placeholder="Short description (optional)" class="form-control"></textarea>
              </div>
              <button type="button" class="btn btn-primary btn-sm" (click)="saveNewCategory()">
                <i class="fas fa-check"></i> Save Category
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="isbn">ISBN <span class="req">*</span></label>
            <input id="isbn" name="isbn" [(ngModel)]="formData.isbn" required
              placeholder="e.g. 978-0-13-468599-1" class="form-control">
          </div>

          <div class="form-group">
            <label for="price">Price ($) <span class="req">*</span></label>
            <div class="input-prefix">
              <span class="prefix">$</span>
              <input id="price" name="price" type="number" min="0" step="0.01"
                [(ngModel)]="formData.price" required placeholder="0.00" class="form-control">
            </div>
          </div>

          <div class="form-group">
            <label for="stock">Stock <span class="req">*</span></label>
            <input id="stock" name="stock" type="number" min="0"
              [(ngModel)]="formData.stock" required placeholder="0" class="form-control">
          </div>

          <div class="form-group">
            <label for="publishedDate">Published Date <span class="req">*</span></label>
            <input id="publishedDate" name="publishedDate" type="date"
              [(ngModel)]="formData.publishedDate" required class="form-control">
          </div>

          <div class="form-group full-width">
            <label for="description">Description</label>
            <textarea id="description" name="description" [(ngModel)]="formData.description"
              rows="4" placeholder="What is this book about?" class="form-control"></textarea>
          </div>

          <div class="form-group full-width">
            <label for="coverImageUrl">Cover Image URL</label>
            <input id="coverImageUrl" name="coverImageUrl" type="url"
              [(ngModel)]="formData.coverImageUrl"
              placeholder="https://example.com/cover.jpg" class="form-control">
          </div>
        </div>

        <div class="form-actions">
          <a routerLink="/books" class="btn btn-ghost">Cancel</a>
          <button type="submit" [disabled]="!isFormValid()" class="btn btn-primary btn-lg">
            <i class="fas" [class.fa-plus]="!isEditMode" [class.fa-check]="isEditMode"></i>
            {{ isEditMode ? 'Save Changes' : 'Add Book' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
