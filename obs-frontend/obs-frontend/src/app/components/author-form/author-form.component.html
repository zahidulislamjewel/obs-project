<div class="form-page container">

  <div class="form-header">
    <a routerLink="/authors" class="back-link">
      <i class="fas fa-arrow-left"></i> Back
    </a>
    <div>
      <h1 class="form-title">{{ isEditMode ? 'Edit Author' : 'Add New Author' }}</h1>
      <p class="form-subtitle">{{ isEditMode ? 'Update the author details below.' : 'Fill in the details to register a new author' }}</p>
    </div>
  </div>

  <div class="form-card">
    <form (ngSubmit)="onSubmit()" #authorForm="ngForm">
      <div class="form-group">
        <label for="name">Name <span class="req">*</span></label>
        <input id="name" name="name" [(ngModel)]="formData.name" required
          placeholder="e.g. George Orwell" class="form-control">
      </div>

      <div class="form-group" style="margin-top: 20px;">
        <label for="bio">Bio</label>
        <textarea id="bio" name="bio" [(ngModel)]="formData.bio"
          rows="5" placeholder="Short biography (optional)" class="form-control"></textarea>
      </div>

      <div class="form-actions" style="margin-top: 28px;">
        <a routerLink="/authors" class="btn btn-ghost">Cancel</a>
        <button type="submit" [disabled]="authorForm.invalid" class="btn btn-primary btn-lg">
          <i class="fas" [class.fa-check]="isEditMode" [class.fa-plus]="!isEditMode"></i>
          {{ isEditMode ? 'Save Changes' : 'Add Author' }}
        </button>
      </div>
    </form>
  </div>

</div>
