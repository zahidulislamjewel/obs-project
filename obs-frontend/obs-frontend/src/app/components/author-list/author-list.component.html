<div class="page container">
  <div class="page-header">
    <div>
      <h1 class="page-title"><i class="fas fa-user-edit"></i> Authors</h1>
      <p class="page-subtitle">All registered authors in the store</p>
    </div>
    <a routerLink="/authors/new" class="btn btn-primary">
      <i class="fas fa-plus"></i> Add Author
    </a>
  </div>

  <div *ngIf="authors.length === 0" class="empty-state">
    <i class="fas fa-user-slash"></i>
    <p>No authors yet. Add the first one!</p>
    <a routerLink="/authors/new" class="btn btn-primary">Add Author</a>
  </div>

  <div *ngIf="authors.length > 0" class="authors-grid">
    <div *ngFor="let a of authors" class="author-card">
      <div class="author-avatar">
        <i class="fas fa-user"></i>
      </div>
      <div class="author-body">
        <div class="author-info">
          <h3 class="author-name">{{ a.name }}</h3>
          <p class="author-bio">{{ a.bio || 'No bio available.' }}</p>
        </div>
        <div class="card-actions">
          <a [routerLink]="['/authors/edit', a.id]" class="btn btn-ghost btn-sm">
            <i class="fas fa-edit"></i> Edit
          </a>
          <button class="btn btn-danger btn-sm" (click)="deleteAuthor(a.id)">
            <i class="fas fa-trash"></i> Delete
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
